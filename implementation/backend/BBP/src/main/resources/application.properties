# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=BBP

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080

# ============================================
# DATABASE CONFIGURATION
# ============================================
# MySQL connection URL with settings:
# - useSSL=false: Disables SSL (use true in production)
# - serverTimezone=UTC: Sets server timezone to UTC
# - allowPublicKeyRetrieval=true: Allows public key retrieval for authentication
# - characterEncoding=utf8: Sets character encoding to UTF-8
# - connectionCollation=utf8mb4_unicode_ci: Sets collation for proper sorting
# - useUnicode=true: Enables Unicode support (including accented characters)
spring.datasource.url=jdbc:mysql://localhost:3306/bbp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useUnicode=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
# Database dialect for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DDL auto mode:
# - create-drop: Creates schema at startup, drops it at shutdown
# - update: Updates schema without dropping existing data (recommended for development)
# - validate: Validates schema without making changes (recommended for production)
# - none: No schema management
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL queries in console
spring.jpa.show-sql=true

# Format SQL queries for better readability
spring.jpa.properties.hibernate.format_sql=true

# Force UTF-8 encoding for Hibernate connections (ensures accented characters work correctly)
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.CharSet=utf8mb4

# ============================================
# LOGGING CONFIGURATION
# ============================================
# Log SQL statements at DEBUG level
logging.level.org.hibernate.SQL=DEBUG

# Log SQL parameter bindings at TRACE level (useful for debugging)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# SECURITY CONFIGURATION (TEMPORARY)
# ============================================
# Temporarily disables Spring Security auto-configuration for development
# TODO: Remove this in production and implement proper security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration