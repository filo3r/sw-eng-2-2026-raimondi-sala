# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=BBP

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/bbp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&useUnicode=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.CharSet=utf8mb4

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=gMMlhdsO4ri8j2XyCzX91u0/g/gYSP4ymmMMkPWLA57d3lqxflvX0yBWaVeOcDSRNN8bH+oIUFr5wMWi60YSzQ==
jwt.expiration=86400000

# ============================================
# SECURITY CONFIGURATION
# ============================================
security.cors.allowed-origins=http://localhost:5173
security.password.bcrypt-strength=10