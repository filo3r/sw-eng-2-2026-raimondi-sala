# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=BBP

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:h2:mem:bbp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# H2 CONSOLE
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# HIKARICP CONNECTION POOL CONFIGURATION
# ============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=BBP-HikariPool

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# JACKSON CONFIGURATION
# ============================================
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=gMMlhdsO4ri8j2XyCzX91u0/g/gYSP4ymmMMkPWLA57d3lqxflvX0yBWaVeOcDSRNN8bH+oIUFr5wMWi60YSzQ==
jwt.expiration=86400000

# ============================================
# SECURITY CONFIGURATION
# ============================================
security.cors.allowed-origins=http://localhost:5173
security.password.bcrypt-strength=10

# ============================================
# MAPBOX CONFIGURATION
# ============================================
mapbox.api.key=MAPBOX-API-KEY
mapbox.api.base-url=https://api.mapbox.com
mapbox.api.searchbox.forward.endpoint=/search/searchbox/v1/forward
mapbox.api.directions.endpoint=/directions/v5/mapbox/cycling
mapbox.api.timeout=10000

# ============================================
# OPEN-METEO WEATHER API CONFIGURATION
# ============================================
open-meteo.api.base-url=https://api.open-meteo.com
open-meteo.api.forecast.endpoint=/v1/forecast
open-meteo.api.timezone=UTC
open-meteo.api.timeout=10000